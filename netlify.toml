# netlify.toml  —  AgriFlow frontend deployment config
# ======================================================
# This file lives at the repo root and tells Netlify how
# to serve the static frontend.

[build]
  publish = "frontend"          # serve from the root — all .html files

# Redirect / to the dashboard
[[redirects]]
  from = "/"
  to   = "/index.html"
  status = 200

# Clean URLs — /map → /map.html
[[redirects]]
  from = "/map"
  to   = "/map.html"
  status = 200

[[redirects]]
  from = "/marketplace"
  to   = "/marketplace.html"
  status = 200

[[redirects]]
  from = "/farmer"
  to   = "/farmer.html"
  status = 200

[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200

# Cache static assets aggressively, HTML never
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
